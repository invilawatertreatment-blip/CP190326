<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Capex Water Infrastructure | PT Invila Tirta Nusantara</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; }
        .bg-grid { background-image: radial-gradient(#ffffff10 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        
        // Custom Hook untuk Lucide Icons agar bekerja di HTML statis
        const Icon = ({ name, color, size = 24, className = "" }) => {
            const [iconSvg, setIconSvg] = useState("");
            React.useEffect(() => {
                const svg = lucide.createIcons({
                    icons: { [name]: lucide[name] },
                    nameAttr: 'data-lucide'
                });
            }, []);
            return <i data-lucide={name} style={{ color: color, width: size, height: size }} className={className}></i>;
        };

        const LandingPage = () => {
            const [volume, setVolume] = useState(1000);
            const [cost, setCost] = useState(7000);
            
            const invilaRate = 4200;
            const saving = (cost - invilaRate) * volume * 30;

            return (
                <div className="min-h-screen text-slate-200 overflow-x-hidden bg-grid">
                    {/* Sales-Focused Navigation */}
                    <nav className="p-6 max-w-7xl mx-auto flex justify-between items-center relative z-10">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-cyan-600 rounded-xl flex items-center justify-center font-black text-white shadow-lg shadow-cyan-600/30 italic">I</div>
                            <div className="leading-none">
                                <span className="font-black tracking-tighter text-white text-lg">INVILA GROUP</span>
                                <p className="text-[8px] text-cyan-500 font-bold tracking-[0.2em] uppercase">Industry 4.0 Solutions</p>
                            </div>
                        </div>
                        <div className="hidden md:block">
                            <a href="https://invila.asia" className="text-[10px] font-bold uppercase tracking-widest text-white hover:text-cyan-400 transition-colors flex items-center gap-2">
                                Main Portal invila.asia <Icon name="ExternalLink" size={14} />
                            </a>
                        </div>
                    </nav>

                    {/* Hero: High Tension Headline */}
                    <section className="pt-24 pb-32 px-6 max-w-6xl mx-auto text-center relative">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full bg-cyan-600/5 blur-[120px] rounded-full -z-10"></div>
                        
                        <div className="inline-flex items-center gap-2 bg-white/5 border border-white/10 px-4 py-2 rounded-full text-[10px] font-bold text-cyan-400 tracking-widest uppercase mb-10">
                            <span className="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span>
                            Infrastruktur Air Tanpa Beban Modal
                        </div>
                        
                        <h1 className="text-4xl md:text-8xl font-black text-white leading-[0.95] mb-10 tracking-tighter">
                            Hentikan Investasi <br/>
                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 italic">Milyaran</span> Untuk <br/>
                            Air Limbah.
                        </h1>
                        
                        <p className="text-lg md:text-2xl text-slate-400 mb-16 max-w-3xl mx-auto font-medium leading-relaxed">
                            Dapatkan teknologi pengolahan air tercanggih dengan model <span className="text-white font-bold italic underline decoration-cyan-500 decoration-2 underline-offset-4 uppercase">Zero Capex</span>. Kami membangun, Anda menghemat.
                        </p>

                        {/* The Sales Magnet: ROI Calculator */}
                        <div className="bg-[#111111] border border-white/10 rounded-[3rem] p-8 md:p-16 shadow-2xl text-left max-w-5xl mx-auto relative overflow-hidden group">
                            <div className="absolute top-0 right-0 p-12 opacity-5 group-hover:opacity-10 transition-opacity">
                                <Icon name="TrendingDown" size={200} />
                            </div>
                            
                            <div className="grid lg:grid-cols-2 gap-16 items-center relative z-10">
                                <div className="space-y-12">
                                    <h2 className="text-3xl font-black text-white italic leading-tight">Ukur Efisiensi <br/> Operasional Anda:</h2>
                                    
                                    <div className="space-y-8">
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-end">
                                                <label className="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Volume Air (m³/hari)</label>
                                                <span className="text-2xl font-black text-white italic">{volume.toLocaleString()} <span className="text-xs not-italic text-slate-600 uppercase">m³</span></span>
                                            </div>
                                            <input 
                                                type="range" min="100" max="10000" step="100" value={volume} 
                                                onChange={(e) => setVolume(Number(e.target.value))}
                                                className="w-full h-2 bg-white/5 rounded-full appearance-none accent-cyan-500 cursor-pointer"
                                            />
                                        </div>
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-end">
                                                <label className="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Biaya Saat Ini (Rp/m³)</label>
                                                <span className="text-2xl font-black text-emerald-400 italic">Rp {cost.toLocaleString()}</span>
                                            </div>
                                            <input 
                                                type="range" min="1000" max="20000" step="500" value={cost} 
                                                onChange={(e) => setCost(Number(e.target.value))}
                                                className="w-full h-2 bg-white/5 rounded-full appearance-none accent-emerald-500 cursor-pointer"
                                            />
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-gradient-to-br from-cyan-600 to-blue-700 p-10 md:p-14 rounded-[2.5rem] text-center shadow-2xl transform hover:scale-[1.02] transition-transform">
                                    <Icon name="ShieldCheck" size={60} className="mx-auto mb-6 opacity-40 text-white" />
                                    <p className="text-[10px] font-black uppercase tracking-[0.4em] text-cyan-100 mb-4 italic">Estimasi Penghematan/Bulan</p>
                                    <div className="text-4xl md:text-6xl font-black text-white mb-12 tracking-tighter italic drop-shadow-xl">
                                        Rp {saving.toLocaleString()}
                                    </div>
                                    <button className="w-full bg-white text-cyan-700 font-black py-5 rounded-2xl text-xs md:text-sm uppercase tracking-[0.2em] shadow-2xl hover:bg-cyan-50 active:scale-95 transition-all">
                                        AMBIL SOLUSI INI SEKARANG
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Industrial Value Props */}
                    <section className="py-32 bg-white text-black px-6">
                        <div className="max-w-7xl mx-auto">
                            <h3 className="text-3xl md:text-6xl font-black mb-20 leading-[0.9] tracking-tighter uppercase italic">Dominasi Industri <br/> Melalui Efisiensi.</h3>
                            
                            <div className="grid md:grid-cols-3 gap-12">
                                {[
                                    { 
                                        title: "Alokasi Capex Strategis", 
                                        desc: "Gunakan modal Anda untuk ekspansi pasar, bukan untuk aset pengolahan limbah yang depresiatif." 
                                    },
                                    { 
                                        title: "Kepatuhan Total 24/7", 
                                        desc: "Lupakan denda regulasi. Kami menjamin air outlet Anda selalu di bawah ambang batas baku mutu." 
                                    },
                                    { 
                                        title: "Transparansi IoT", 
                                        desc: "Pantau performa sistem secara real-time via invila.asia. Data yang tidak bisa dimanipulasi." 
                                    }
                                ].map((item, i) => (
                                    <div key={i} className="space-y-4 border-l-4 border-cyan-600 pl-8">
                                        <h4 className="text-xl font-black uppercase italic leading-none">{item.title}</h4>
                                        <p className="text-slate-600 text-sm font-medium leading-relaxed">{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Footer / CTA */}
                    <footer className="py-24 bg-black text-center px-6 border-t border-white/5">
                        <h2 className="text-2xl md:text-4xl font-black text-white mb-12 italic uppercase tracking-tighter">Membangun Kedaulatan Industri Indonesia.</h2>
                        <div className="flex flex-col md:flex-row justify-center items-center gap-12 opacity-30 grayscale contrast-125 mb-20 font-black italic text-xl">
                            <span>SPAM DEPOK</span>
                            <span>PDAM MEDAN</span>
                            <span>PETRO GRESIK</span>
                            <span>KI WIJAYA KUSUMA</span>
                        </div>
                        <p className="text-[10px] text-slate-700 font-black uppercase tracking-[0.5em] mb-4">© 2026 PT INVILA TIRTA NUSANTARA</p>
                        <a href="https://invila.asia" className="text-cyan-600 text-[10px] font-black uppercase tracking-widest border-b border-cyan-600/30 pb-1">Visit Corporate Portal: invila.asia</a>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LandingPage />);
    </script>
</body>
</html>
